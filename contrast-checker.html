<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contrast Checker</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #111;
                min-height: 100vh;
                padding: 48px 24px;
            }

            #app {
                max-width: 720px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 32px;
            }

            h1 {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            #inputs {
                display: flex;
                gap: 16px;
            }

            .color-group {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .color-group label {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #666;
            }

            .color-group input[type="text"] {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 15px;
                font-family: monospace;
                background: #fff;
                color: #111;
            }

            .color-group input[type="color"] {
                width: 100%;
                height: 48px;
                border: 1px solid #ddd;
                border-radius: 8px;
                cursor: pointer;
                padding: 4px;
                background: #fff;
            }
        </style>
    </head>
    <body>

        <div id="app">

            <h1>WCAG Contrast Checker</h1>

            <div id="inputs">

                <div class="color-group">
                    <label>Foreground</label>
                    <input type="text" id="fg-hex" placeholder="#000000">
                    <input type="color" id="fg-picker">
                </div>

                <div class="color-group">
                    <label>Background</label>
                    <input type="text" id="bg-hex" placeholder="#FFFFFF">
                    <input type="color" id="bg-picker">
                </div>

            </div>

            <div id="results">
                <p id="ratio">Contrast Ratio: —</p>

                <div id="badges">
                    <span id="aa-normal">AA Normal: —</span>
                    <span id="aa-large">AA Large: —</span>
                    <span id="aaa-normal">AAA Normal: —</span>
                    <span id="aaa-large">AAA Large: —</span>
                </div>

            </div>

            <div id="preview">
                <p id="preview-text">The quick brown fox jumps over the lazy dog</p>
            </div>

        </div>


        

    </body>
</html>
