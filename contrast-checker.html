<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contrast Checker</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #111;
                min-height: 100vh;
                padding: 48px 24px;
            }

            #app {
                max-width: 720px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 32px;
            }

            h1 {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            #inputs {
                display: flex;
                gap: 16px;
            }

            .color-group {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .color-group label {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #666;
            }

            .color-group input[type="text"] {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 15px;
                font-family: monospace;
                background: #fff;
                color: #111;
            }

            .color-group input[type="color"] {
                width: 100%;
                height: 48px;
                border: 1px solid #ddd;
                border-radius: 8px;
                cursor: pointer;
                padding: 4px;
                background: #fff;
            }

            #results {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            #ratio {
                font-size: 28px;
                font-weight: 700;
                letter-spacing: -0.03em;
            }

            #badges {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            #badges span {
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: 600;
                background: #e5e5e5;
                color: #666;
            }

            #preview {
                border-radius: 12px;
                padding: 48px 32px;
                background: #fff;
                border: 1px solid #ddd;
            }

            #preview-text {
                font-size: 18px;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>

        <div id="app">

            <h1>WCAG Contrast Checker</h1>

            <div id="inputs">

                <div class="color-group">
                    <label>Foreground</label>
                    <input type="text" id="fg-hex" placeholder="#000000">
                    <input type="color" id="fg-picker">
                </div>

                <div class="color-group">
                    <label>Background</label>
                    <input type="text" id="bg-hex" placeholder="#FFFFFF">
                    <input type="color" id="bg-picker">
                </div>

            </div>

            <div id="results">
                <p id="ratio">Contrast Ratio: —</p>

                <div id="badges">
                    <span id="aa-normal">AA Normal: —</span>
                    <span id="aa-large">AA Large: —</span>
                    <span id="aaa-normal">AAA Normal: —</span>
                    <span id="aaa-large">AAA Large: —</span>
                </div>

            </div>

            <div id="preview">
                <p id="preview-text">The quick brown fox jumps over the lazy dog</p>
            </div>

        </div>

        <script>
            function hexToRgb(hex) {
                hex = hex.replace('#', '');
                if (hex.length === 3) {
                    hex = hex[0]+hex[0] + hex[1]+hex[1] + hex[2]+hex[2];
                }
                return {
                    r: parseInt(hex.substring(0, 2), 16),
                    g: parseInt(hex.substring(2, 4), 16),
                    b: parseInt(hex.substring(4, 6), 16)
                };
            }

            function getRelativeLuminance(rgb) {
                const vals = [rgb.r, rgb.g, rgb.b].map(v => {
                    v = v / 255;
                    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
                });
                return 0.2126 * vals[0] + 0.7152 * vals[1] + 0.0722 * vals[2];
            }

            function getContrastRatio(hex1, hex2) {
                const L1 = getRelativeLuminance(hexToRgb(hex1));
                const L2 = getRelativeLuminance(hexToRgb(hex2));
                const lighter = Math.max(L1, L2);
                const darker = Math.min(L1, L2);
                return (lighter + 0.05) / (darker + 0.05);
            }

            const fgPicker = document.getElementById('fg-picker');
            const bgPicker = document.getElementById('bg-picker');
            const fgHex = document.getElementById('fg-hex');
            const bgHex = document.getElementById('bg-hex');

            fgPicker.addEventListener('input', () => {
                fgHex.value = fgPicker.value;
            });

            bgPicker.addEventListener('input', () => {
                bgHex.value = bgPicker.value;
            });

            fgHex.addEventListener('input', () => {
                if (fgHex.value.length === 7) {
                    fgPicker.value = fgHex.value;
                }
            });

            bgHex.addEventListener('input', () => {
                if (bgHex.value.length === 7) {
                    bgPicker.value = bgHex.value;
                }
            });

            function updateUI() {
                const fg = fgHex.value;
                const bg = bgHex.value;

                if (fg.length !== 7 || bg.length !== 7) return;

                const ratio = getContrastRatio(fg, bg);
                document.getElementById('ratio').textContent = `Contrast Ratio: ${ratio.toFixed(2)}:1`;
            }

        </script>

    </body>
</html>
